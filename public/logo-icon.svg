<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Badge background -->
  <rect x="0" y="0" width="100" height="100" rx="18" fill="#131A2B"/>

  <!-- Letter E -->
  <rect x="12" y="18" width="8" height="52" rx="2" fill="#2994FF"/>
  <rect x="12" y="18" width="32" height="8" rx="2" fill="#2994FF"/>
  <rect x="12" y="40" width="25" height="8" rx="2" fill="#2994FF"/>
  <rect x="12" y="62" width="32" height="8" rx="2" fill="#2994FF"/>

  <!-- Circuit dots E -->
  <circle cx="44" cy="22" r="3.5" fill="#30CDD8" filter="url(#glow)"/>
  <line x1="44" y1="22" x2="50" y2="22" stroke="#30CDD8" stroke-width="1.5" opacity="0.4"/>
  <circle cx="37" cy="44" r="3.5" fill="#30CDD8" filter="url(#glow)"/>
  <circle cx="44" cy="66" r="3.5" fill="#30CDD8" filter="url(#glow)"/>
  <line x1="44" y1="66" x2="50" y2="66" stroke="#30CDD8" stroke-width="1.5" opacity="0.4"/>

  <!-- Letter H -->
  <rect x="54" y="18" width="8" height="52" rx="2" fill="#2994FF"/>
  <rect x="80" y="18" width="8" height="52" rx="2" fill="#2994FF"/>
  <rect x="54" y="40" width="34" height="8" rx="2" fill="#2994FF"/>

  <!-- Circuit dots H -->
  <circle cx="58" cy="15" r="3.5" fill="#30CDD8" filter="url(#glow)"/>
  <line x1="58" y1="12" x2="58" y2="6" stroke="#30CDD8" stroke-width="1.5" opacity="0.4"/>
  <circle cx="84" cy="15" r="3.5" fill="#30CDD8" filter="url(#glow)"/>
  <line x1="84" y1="12" x2="84" y2="6" stroke="#30CDD8" stroke-width="1.5" opacity="0.4"/>
  <circle cx="58" cy="73" r="3.5" fill="#30CDD8" filter="url(#glow)"/>
  <line x1="58" y1="76" x2="58" y2="82" stroke="#30CDD8" stroke-width="1.5" opacity="0.4"/>
  <circle cx="84" cy="73" r="3.5" fill="#30CDD8" filter="url(#glow)"/>
  <line x1="84" y1="76" x2="84" y2="82" stroke="#30CDD8" stroke-width="1.5" opacity="0.4"/>
</svg>
